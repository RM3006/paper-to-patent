[project]
name = "paper-to-patent"
version = "0.1.0"
description = "The Chips Behind AI — research paper to US patent tracker"
requires-python = ">=3.11"
dependencies = [
    "duckdb>=1.1.0",
    "httpx>=0.27.0",
    "polars>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6.0",
    "pyright>=1.1.380",
    "pytest>=8.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "strict"

[dependency-groups]
dev = [
    "ruff>=0.6.0",
    "pyright>=1.1.380",
    "pytest>=8.0.0",
]
