version: 2

sources:
  - name: openalex_raw
    description: >
      OpenAlex works raw Parquet on R2 (r2://p2p-lake/raw/openalex/).
      Views created at run-start via the create_external_sources() macro.
    tables:
      - name: works
        description: >
          164,072 scope works (topics T11338/T10299/T11429/T10502, 2012-2025,
          language:en, has_abstract:true).
        columns:
          - name: openalex_id
            description: OpenAlex work URL (https://openalex.org/W…)
          - name: doi
            description: DOI URL — primary join key for NPL matcher
          - name: title
            description: Paper title
          - name: publication_date
            description: "Publication date (YYYY-MM-DD) — citation-lag anchor"
          - name: publication_year
            description: Year (redundant with date; kept for fast filtering)
          - name: language
            description: Language code (en only in scope)
          - name: abstract
            description: Reconstructed from abstract_inverted_index; NULL if absent
          - name: primary_topic_id
            description: OpenAlex topic URL (one of 4 scope topics)
          - name: primary_topic_name
            description: Human-readable topic name
          - name: institution_ids
            description: List of OpenAlex institution URLs from all authorships
          - name: institution_rors
            description: List of ROR URLs from all authorships
          - name: institution_display_names
            description: List of institution display names from all authorships

  - name: patentsview_raw
    description: >
      PatentsView bulk TSV converted to Parquet on R2 (r2://p2p-lake/raw/patentsview/).
      Views created at run-start via the create_external_sources() macro.
    tables:
      - name: patents
        description: Core patent metadata (9.4M rows, full corpus)
        columns:
          - name: patent_id
            description: USPTO patent number (String; may be prefixed for design/plant/reissue)
          - name: patent_type
            description: utility / design / plant / reissue / defensive_publication
          - name: patent_date
            description: "Grant date (YYYY-MM-DD) — metadata only, never used for time metrics"
          - name: patent_title
            description: Title as granted
          - name: num_claims
            description: Number of claims

      - name: applications
        description: Filing metadata — provides the citation-lag anchor filing_date (9.45M rows)
        columns:
          - name: patent_id
            description: Links to patents.patent_id (one row per patent, no duplicates)
          - name: filing_date
            description: "Filing date (YYYY-MM-DD) — the citation-lag anchor"
          - name: application_id
            description: USPTO application serial number

      - name: patents_scoped
        description: Scope-filtered corpus — CPC match + filing_date 2014–2025 (33,578 rows)
        columns:
          - name: patent_id
            description: Scope-matched patent; all downstream assets join against this set
          - name: filing_date
            description: Filing date from g_application (citation-lag anchor)
          - name: patent_title
            description: Title as granted
          - name: patent_date
            description: Grant date — metadata only

      - name: assignees
        description: Disambiguated patent assignees (8.75M rows)
        columns:
          - name: patent_id
            description: Links to patents.patent_id
          - name: assignee_id
            description: Disambiguated assignee UUID — patent-side ER identity
          - name: disambig_assignee_organization
            description: Disambiguated organisation name (NULL for individual assignees)
          - name: assignee_type
            description: 2=US company, 3=foreign company, 4-7=individuals/govt

      - name: cpc
        description: CPC classification assignments (59.8M rows, multiple per patent)
        columns:
          - name: patent_id
            description: Links to patents.patent_id
          - name: cpc_group
            description: Full group code (e.g. G03F7/2004) — scope filter uses prefix match here

      - name: npl
        description: Non-patent literature references (65.2M rows full corpus)
        columns:
          - name: patent_id
            description: Citing patent
          - name: other_reference_sequence
            description: Order among NPL refs for this patent
          - name: other_reference_text
            description: Free-text citation string (raw input for NPL matcher)

      - name: citations
        description: Patent-to-patent citation edges (152.6M rows)
        columns:
          - name: patent_id
            description: Citing patent
          - name: citation_patent_id
            description: Cited patent

  - name: er_intermediate
    description: >
      Entity-resolution and NPL-matcher intermediate outputs on R2.
      Views created at run-start via the create_external_sources() macro.
    tables:
      - name: org_crosswalk
        description: >
          int_organization_crosswalk — 16,198 rows, 14,209 distinct org_ids.
          One row per (source, source_id). Every org in scope with match_method + confidence.
        columns:
          - name: org_id
            description: Canonical identifier slug
            tests: [not_null]
          - name: source
            description: patentsview or openalex
            tests: [not_null]
          - name: source_id
            description: assignee_id (PV) or institution_id (OA)
            tests: [not_null]
          - name: canonical_name
            description: Human-readable org name
          - name: match_method
            description: native_id | seed_crosswalk | fuzzy_high | ror
            tests: [not_null]
          - name: confidence
            description: high | medium | low
            tests: [not_null]

      - name: npl_links
        description: >
          Python NPL matcher output (Step 2). One row per resolved paper↔patent edge.
          Written by the npl_links_raw Dagster asset to r2://p2p-lake/intermediate/npl/.
        columns:
          - name: patent_id
            description: Citing patent (in scope)
            tests: [not_null]
          - name: work_id
            description: Matched OpenAlex work ID (e.g. W2741809807)
            tests: [not_null]
          - name: match_method
            description: npl_citation (DOI or fuzzy-title route)
            tests: [not_null]
          - name: confidence
            description: high (DOI route) or medium (fuzzy-title route)
            tests: [not_null]
          - name: doi_extracted
            description: DOI extracted from ref_text (NULL for fuzzy-title matches)
