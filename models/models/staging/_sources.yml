version: 2

sources:
  - name: openalex_raw
    description: >
      Raw papers data from the source literature database, before any
      cleaning or scope filtering.
    tables:
      - name: works
        description: >
          164,072 papers matching this atlas's scope (specific subject-area
          topics, 2012–2025, English language, with an abstract available).
        columns:
          - name: openalex_id
            description: A web link to this paper's record in the source literature database.
          - name: doi
            description: This paper's DOI (Digital Object Identifier) — the standard identifier used to recognise it elsewhere, including in a citing patent.
          - name: title
            description: Paper title.
          - name: type
            description: >
              The kind of publication this is (article, preprint, or
              review). Note that the source occasionally mislabels a
              non-research entry (e.g. a software release announcement) as
              an article.
          - name: publication_date
            description: "Publication date — the anchor for paper-side time comparisons."
          - name: publication_year
            description: Year (redundant with the full date, kept for fast filtering).
          - name: language
            description: Reported language of the paper (English only in scope).
          - name: abstract
            description: Paper abstract; NULL when the source has none available.
          - name: primary_topic_id
            description: The subject-area topic this paper is primarily about (one of the topics in scope for this atlas).
          - name: primary_topic_name
            description: Human-readable topic name.
          - name: institution_ids
            description: Every co-authoring institution's identifier for this paper, as a list.
          - name: institution_rors
            description: Standardised registry identifier for each co-authoring institution.
          - name: institution_display_names
            description: Display name for each co-authoring institution.

  - name: patentsview_raw
    description: >
      Raw patents data from the US patent office's bulk records, before any
      cleaning or scope filtering.
    tables:
      - name: patents
        description: Core patent metadata across the full patent record (9.4M rows).
        columns:
          - name: patent_id
            description: US patent number.
          - name: patent_type
            description: utility / design / plant / reissue / defensive_publication.
          - name: patent_date
            description: "Grant date — reference only, never used to measure timing."
          - name: patent_title
            description: Title as granted.
          - name: num_claims
            description: Number of claims.

      - name: applications
        description: Filing metadata, providing each patent's filing date (9.45M rows).
        columns:
          - name: patent_id
            description: Links to patents.patent_id (one row per patent).
          - name: filing_date
            description: "Filing date — the anchor for patent-side time comparisons."
          - name: application_id
            description: Application serial number.

      - name: patents_scoped
        description: Patents matching this atlas's scope — relevant classification codes, filed between 2014 and 2025 (33,578 rows).
        columns:
          - name: patent_id
            description: A scope-matched patent.
          - name: filing_date
            description: Filing date.
          - name: patent_title
            description: Title as granted.
          - name: patent_date
            description: Grant date — reference only.

      - name: assignees
        description: Patent assignees, resolved to a consistent identifier across filings (8.75M rows).
        columns:
          - name: patent_id
            description: Links to patents.patent_id.
          - name: assignee_id
            description: Identifier for this assignee.
          - name: disambig_assignee_organization
            description: Organisation name (NULL for individual assignees).
          - name: assignee_type
            description: 2=US company, 3=foreign company, 4-7=individuals/other.

      - name: cpc
        description: Classification code assignments (59.8M rows, several per patent).
        columns:
          - name: patent_id
            description: Links to patents.patent_id.
          - name: cpc_group
            description: Full classification code (e.g. G03F7/2004).

      - name: npl
        description: Citations to non-patent literature — i.e. to research papers, rather than to other patents (65.2M rows across the full patent record).
        columns:
          - name: patent_id
            description: Citing patent.
          - name: other_reference_sequence
            description: Order among this patent's non-patent-literature citations.
          - name: other_reference_text
            description: Raw citation text.

      - name: citations
        description: Patent-to-patent citation edges (152.6M rows).
        columns:
          - name: patent_id
            description: Citing patent.
          - name: citation_patent_id
            description: Cited patent.

  - name: er_intermediate
    description: >
      Organisation-matching and citation-matching results — the output of
      resolving organisation identities and paper↔patent citation links.
    tables:
      - name: org_crosswalk
        description: >
          16,198 records resolving to 14,209 distinct organisations. One
          row per (population, native identifier), each stating how it was
          matched and how confident that match is.
        columns:
          - name: org_id
            description: "{{ doc('org_id') }}"
            tests: [not_null]
          - name: source
            description: Which population this record comes from — patentsview or openalex.
            tests: [not_null]
          - name: source_id
            description: The native identifier for this record in its own population (an assignee identifier for patents, an institution identifier for papers).
            tests: [not_null]
          - name: canonical_name
            description: Human-readable organisation name.
          - name: match_method
            description: "{{ doc('match_method') }}"
            tests: [not_null]
          - name: confidence
            description: "{{ doc('confidence') }}"
            tests: [not_null]

      - name: npl_links
        description: One row per resolved paper↔patent citation link.
        columns:
          - name: patent_id
            description: "{{ doc('patent_id') }} The citing, in-scope patent."
            tests: [not_null]
          - name: work_id
            description: "{{ doc('work_id') }} The matched paper."
            tests: [not_null]
          - name: match_method
            description: "{{ doc('match_method') }}"
            tests: [not_null]
          - name: confidence
            description: "{{ doc('confidence') }}"
            tests: [not_null]
          - name: doi_extracted
            description: Paper identifier (DOI) found directly in the citation text, when there was one.

  - name: ml_intermediate
    description: >
      Clustering and cluster-labelling results. Each table here is only
      available once clustering has been computed for the current corpus.
    tables:
      - name: clusters
        description: Cluster assignment and map position for every document that has been through clustering.
        columns:
          - name: doc_id
            description: "{{ doc('work_id') }} for papers, {{ doc('patent_id') }} for patents."
            tests: [not_null]
          - name: doc_type
            description: "'paper' | 'patent'"
            tests: [not_null]
          - name: cluster_id
            description: "{{ doc('cluster_id') }}"
            tests: [not_null]
          - name: umap_x
            description: Horizontal position on the technology map.
          - name: umap_y
            description: Vertical position on the technology map.
          - name: model_version
            description: Which version of the underlying similarity model produced this position.

      - name: cluster_labels
        description: Plain-English name and description for every cluster.
        columns:
          - name: cluster_id
            description: "{{ doc('cluster_id') }} Primary key of this table."
            tests: [not_null]
          - name: tagline
            description: "Short human-readable name for the cluster (2–6 words)."
            tests: [not_null]
          - name: summary_friendly
            description: "2–3 plain-English sentences describing what the cluster is about."
            tests: [not_null]
          - name: top_terms
            description: "The terms that most distinguish this cluster from the rest of the corpus."

      - name: excluded_documents
        description: >
          Documents that were screened out of the corpus entirely before
          clustering — e.g. a title that looked like a version number
          rather than a real title, or content that couldn't be identified
          as English. Papers and patents excluded here don't appear
          anywhere else in this atlas at all.
        columns:
          - name: doc_id
            description: "{{ doc('work_id') }} for papers, {{ doc('patent_id') }} for patents."
            tests: [not_null]
          - name: doc_type
            description: "'paper' | 'patent'"
            tests: [not_null]
          - name: exclusion_reason
            description: "'version_style_title' | 'non_english_content'"
            tests: [not_null]
          - name: model_version
            description: Which version of the underlying quality-check model made this decision.
