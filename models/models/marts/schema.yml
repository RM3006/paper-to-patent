version: 2

models:
  - name: dim_organization
    description: >
      One row per canonical org_id spanning both OpenAlex institutions and PatentsView assignees.
      Built from int_organization_crosswalk (Part 3). 14,209 distinct org_ids.
    columns:
      - name: org_id
        description: Canonical identifier slug (e.g. org_nvidia, org_pv_…, org_oa_…)
        tests: [not_null, unique]
      - name: canonical_name
        description: Human-readable organisation name
        tests: [not_null]
      - name: primary_match_method
        description: Method that yielded this canonical name (seed_crosswalk > fuzzy_high > native_id > ror)
        tests: [not_null]

  - name: dim_cpc
    description: One row per distinct CPC group code appearing in scope patents.
    columns:
      - name: cpc_group
        description: Full CPC group code (e.g. G03F7/2004)
        tests: [not_null, unique]

  - name: dim_technology_cluster
    description: >
      One row per technology cluster. Includes the noise cluster (c_noise).
      cluster_id, tagline, summary_friendly, and top c-TF-IDF terms per cluster.
      Populated after Part 5 cluster_labels Dagster asset runs and dbt is rebuilt.
    columns:
      - name: cluster_id
        description: Cluster identifier string (e.g. c_0, c_1, c_noise)
        tests: [not_null, unique]
      - name: tagline
        description: "Short human-readable technology family name (2–6 words)"
        tests: [not_null]
      - name: summary_friendly
        description: "2–3 plain-English sentences describing this cluster"
        tests: [not_null]

  - name: fact_document_cluster
    description: >
      One row per document in the ML embedding corpus.
      Maps every paper and patent to a technology cluster with 2D UMAP coordinates.
      doc_type 'paper' → doc_id = work_id (dim_paper); 'patent' → doc_id = patent_id (dim_patent).
      Populated after Part 5 document_clusters Dagster asset runs and dbt is rebuilt.
    columns:
      - name: doc_id
        description: OpenAlex work_id (papers) or USPTO patent_id (patents)
        tests: [not_null, unique]
      - name: doc_type
        description: "'paper' | 'patent'"
        tests: [not_null]
      - name: cluster_id
        description: FK → dim_technology_cluster.cluster_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technology_cluster')
                field: cluster_id
      - name: umap_x
        tests: [not_null]
      - name: umap_y
        tests: [not_null]
      - name: model_version
        tests: [not_null]

  - name: dim_paper
    description: >
      One row per OpenAlex work in scope (164,072 rows).
      cluster_id back-filled from fact_document_cluster after Part 5 ML pipeline runs.
    columns:
      - name: work_id
        description: OpenAlex short work ID (e.g. W2741809807)
        tests: [not_null, unique]
      - name: publication_date
        description: "Publication date — citation-lag anchor"
        tests: [not_null]

  - name: dim_patent
    description: >
      One row per scope patent (33,578 rows, CPC match + filing_date 2014–2025).
      cluster_id back-filled from fact_document_cluster after Part 5 ML pipeline runs.
    columns:
      - name: patent_id
        description: USPTO patent number
        tests: [not_null, unique]
      - name: filing_date
        description: "Filing date — citation-lag anchor (never grant_date)"
        tests: [not_null]

  - name: fact_publication
    description: >
      One row per (paper, institution) combination.
      org_id attached via the crosswalk; NULL allowed where institution is not in scope crosswalk.
      cluster_id denormalised from fact_document_cluster for fast analytical queries.
    columns:
      - name: work_id
        tests: [not_null]
      - name: institution_id
        tests: [not_null]
      - name: publication_date
        tests: [not_null]
      - name: org_id
        description: NULL when institution has no crosswalk entry
      - name: cluster_id
        description: FK → dim_technology_cluster.cluster_id; NULL before Part 5 ML pipeline runs

  - name: fact_patent_filing
    description: >
      One row per (patent, assignee) combination.
      Anchored on filing_date. org_id NULL for individual assignees or those not in the crosswalk.
      cluster_id denormalised from fact_document_cluster for fast analytical queries.
    columns:
      - name: patent_id
        tests: [not_null]
      - name: filing_date
        tests: [not_null]
      - name: cluster_id
        description: FK → dim_technology_cluster.cluster_id; NULL before Part 5 ML pipeline runs

  - name: fact_patent_citation
    description: Patent-to-patent citation edges for scope patents.
    columns:
      - name: citing_patent_id
        tests: [not_null]
      - name: cited_patent_id
        tests: [not_null]

  - name: mart_competitive
    description: >
      Competitive landscape mart. Grain: (cluster_id, side, org_id_key).
      side='patent': distinct US patents assigned to org per cluster.
      side='paper': distinct papers attributed to org per cluster.
      Paper-side shares can sum >100% per cluster (co-attribution, not partitioned share).
      Unresolved orgs (no crosswalk match) included with canonical_name='Unresolved'.
      rank_in_cluster: rank by doc_count within each (cluster, side).
    columns:
      - name: cluster_id
        tests: [not_null]
      - name: side
        tests: [not_null]
      - name: org_id_key
        tests: [not_null]
      - name: canonical_name
        tests: [not_null]
      - name: doc_count
        tests: [not_null]
      - name: share
        tests: [not_null]
      - name: cluster_total
        tests: [not_null]
      - name: rank_in_cluster
        tests: [not_null]

  - name: mart_gap
    description: >
      Research-to-patent concentration gap mart. Grain: one row per cluster_id.
      HHI (Herfindahl-Hirschman Index, 0–1) over primary assignees of US patents.
      n_institutions: distinct OpenAlex institution_ids contributing papers.
      hhi is NULL when n_patents < 10 (not reportable); hhi_reportable signals this.
      pct_unresolved_patents: fraction of patents with no resolved org (excluded from HHI).
      Framing: concentration within US patents — not a global geography comparison.
    columns:
      - name: cluster_id
        tests: [not_null, unique]
      - name: n_patents
        tests: [not_null]
      - name: hhi_reportable
        tests: [not_null]
      - name: n_institutions
        tests: [not_null]
      - name: n_papers
        tests: [not_null]
      - name: hhi
        description: >
          HHI in [0, 1] (NULL when n_patents < 10). Never described as implying
          causation — it is a descriptive concentration metric within US patents.

  - name: mart_velocity
    description: >
      Technology velocity mart. Grain: (cluster_id, year).
      Contains research-onset vs patent-onset annual counts and two citation-lag metrics:
      NPL-linked (rigorous, patent-cluster anchor, N must be ≥ 20 to be reportable) and
      cohort lag (soft estimate — papers and patents in same cluster, not necessarily linked).
      c_noise rows included; filter is_noise = false for headline findings.
    columns:
      - name: cluster_id
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: tagline
        tests: [not_null]
      - name: paper_count
        tests: [not_null]
      - name: patent_count
        tests: [not_null]
      - name: npl_n_links
        tests: [not_null]
      - name: npl_reportable
        tests: [not_null]
      - name: npl_median_lag_years
        description: >
          Median citation lag in years (publication_date → patent filing_date, via NPL link).
          NULL when npl_n_links < 20. Never described as lead time.
      - name: cohort_lag_years
        description: >
          SOFT ESTIMATE: median(patent filing year) − median(paper pub year) per cluster.
          Not derived from NPL links. May be negative (patents pre-date research in cluster).

  - name: fact_npl_link
    description: >
      Resolved paper↔patent edges via NPL citations.
      citation_lag_days = publication_date → filing_date interval (never "lead time").
      All rows have match_method + confidence. Populated after Step 2.
    columns:
      - name: patent_id
        tests: [not_null]
      - name: work_id
        tests: [not_null]
      - name: match_method
        tests: [not_null]
      - name: confidence
        tests: [not_null]
      - name: citation_lag_days
        description: Days from paper publication to citing patent filing
