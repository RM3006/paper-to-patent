version: 2

models:
  - name: idea_journey
    description: >
      An organisation's full story in one place: every paper it published,
      every patent it filed, and any confirmed citation link connecting a
      specific paper to a specific patent. One row per (organisation, paper,
      patent) combination — filter to a single organisation to see its
      complete paper and patent activity side by side. Includes papers and
      patents with no confirmed link between them, not just linked pairs,
      since an organisation's unlinked work is still part of its story.
    columns:
      - name: org_id
        description: "{{ doc('org_id') }}"
      - name: org_name
        description: "{{ doc('org_id') }} display name."
      - name: work_id
        description: "{{ doc('work_id') }} NULL when this organisation has no papers."
      - name: paper_title
        description: "Title of the paper. NULL when work_id is NULL."
      - name: publication_date
        description: "{{ doc('publication_date') }} NULL when work_id is NULL."
      - name: doi
        description: "This paper's DOI. NULL when work_id is NULL, or when the paper has no DOI."
      - name: primary_topic_name
        description: "This paper's subject-area topic."
      - name: patent_id
        description: "{{ doc('patent_id') }} NULL when this organisation has no patents."
      - name: patent_title
        description: "Title of the patent. NULL when patent_id is NULL."
      - name: filing_date
        description: "{{ doc('filing_date') }} NULL when patent_id is NULL."
      - name: grant_date
        description: "The date this patent was formally granted. Shown for reference only — never used to measure timing."
      - name: primary_cpc
        description: "This patent's primary classification code."
      - name: npl_match_method
        description: "{{ doc('match_method') }} NULL until this (paper, patent) pair has a confirmed citation link."
      - name: npl_confidence
        description: "{{ doc('confidence') }} NULL until this (paper, patent) pair has a confirmed citation link."
      - name: citation_lag_days
        description: "{{ doc('citation_lag') }} Expressed in days. NULL until this (paper, patent) pair has a confirmed citation link."
      - name: citation_lag_years
        description: "{{ doc('citation_lag') }} Expressed in years. NULL until this (paper, patent) pair has a confirmed citation link."
