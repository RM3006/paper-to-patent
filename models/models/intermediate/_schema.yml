version: 2

models:
  - name: int_org_crosswalk
    description: >
      Org crosswalk sourced from R2 — re-exposes the Part 3 entity-resolution
      output inside the dbt graph so marts can ref() it. One row per
      (source, source_id); dim_organization collapses this to one row per
      org_id. Passthrough only — no filtering or enrichment at this layer.
    columns:
      - name: org_id
        description: "{{ doc('org_id') }} Not unique in this model — multiple (source, source_id) rows can share the same org_id."
        tests: [not_null]
      - name: source
        description: "'patentsview' or 'openalex' — which corpus source_id belongs to."
        tests: [not_null]
      - name: source_id
        description: "Native source identifier: PatentsView assignee_id when source='patentsview', OpenAlex institution_id when source='openalex'."
        tests: [not_null]
      - name: canonical_name
        description: "Human-readable organisation name for this source row. May differ across rows sharing the same org_id; dim_organization picks one per the match_method priority order."
      - name: match_method
        description: "{{ doc('match_method') }}"
        tests: [not_null]
      - name: confidence
        description: "{{ doc('confidence') }}"
        tests: [not_null]
