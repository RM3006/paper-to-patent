name: paper_to_patent
version: "1.0.0"
profile: paper_to_patent

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # Bucket/local root every source path in create_external_sources() is built
  # from. CI's dbt-docs workflow overrides this to "models/fixtures" (local
  # zero-row stubs) so the docs build never touches R2.
  source_root: "r2://p2p-lake"

on-run-start:
  - "{{ create_external_sources() }}"

models:
  paper_to_patent:
    staging:
      +materialized: table
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
    queries:
      +materialized: view
      +schema: marts
