name: Repo heartbeat

# GitHub disables scheduled workflows after 60 days of no push activity.
# This workflow runs daily but only commits when 59 days have passed since
# the last commit — no hardcoded dates, git history is the clock.

on:
  schedule:
    - cron: "0 4 * * *"  # daily at 04:00 UTC (cheap check, commits rarely)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if 59 days have passed since last push
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
          echo "Days since last commit: $DAYS"
          if [ "$DAYS" -ge 59 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: repo heartbeat [skip ci]"
            git push
            echo "Heartbeat commit pushed after ${DAYS} days."
          else
            echo "No commit needed (${DAYS}/59 days elapsed)."
          fi
