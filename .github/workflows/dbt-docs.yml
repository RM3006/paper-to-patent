name: dbt docs

on:
  push:
    branches: [main]
    paths:
      - "models/**"
      - ".github/workflows/dbt-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: dbt build (prod)
    runs-on: ubuntu-latest
    # Prevents two overlapping runs (e.g. two quick pushes to main) from
    # racing against the same MotherDuck warehouse.
    concurrency:
      group: motherduck-prod-build
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: dbt build (rebuild the live MotherDuck warehouse from R2)
        # Promotes whatever's on main into the production warehouse the
        # deployed Streamlit app reads from. Unlike the docs-build job below,
        # this one touches the real, shared warehouse, so it needs real
        # credentials: R2 read access (to read raw Parquet during staging)
        # and MOTHERDUCK_TOKEN (to write staging/intermediate/marts into
        # MotherDuck).
        run: >
          uv run dbt build
          --project-dir models
          --profiles-dir models
          --target prod
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

  docs-build:
    name: dbt docs generate
    needs: deploy-prod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: dbt docs generate (against the real MotherDuck warehouse)
        # Runs after deploy-prod, against the prod target -- so the published
        # catalog reflects the real schema AND real row counts/stats from the
        # rebuild that job just did, instead of an all-zero fixture stand-in.
        # No separate build step needed here: MotherDuck is a persistent
        # shared database, not an ephemeral local file, so this job can just
        # connect and introspect what deploy-prod already materialized.
        run: >
          uv run dbt docs generate
          --project-dir models
          --profiles-dir models
          --target prod
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: models/target

  deploy:
    name: Deploy to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
