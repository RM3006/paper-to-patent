name: Ping app (reusable)

# The actual work of keep-app-alive.yml, factored out so it can be run twice
# in one workflow — see keep-app-alive.yml for why.

on:
  workflow_call:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright

      - name: Install Chromium
        run: |
          # `--with-deps` runs apt-get update, which fails hard if any repo
          # baked into the runner image is unhealthy. The third-party Microsoft
          # repos (packages.microsoft.com) periodically serve an invalid
          # InRelease file and have nothing to do with Chromium's libraries —
          # drop them first so a Microsoft mirror outage can't take this job
          # down.
          grep -rl packages.microsoft.com /etc/apt/sources.list.d/ | sudo xargs -r rm -f
          playwright install --with-deps chromium

      - name: Load Streamlit app
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout

          APP_URL = "https://paper-to-patent-a7iiegantbeucyxxwegpyz.streamlit.app/"
          EXPECTED_TITLE = "The Chips Behind AI"  # set by st.set_page_config in app.py

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(APP_URL, wait_until="load", timeout=60000)

              # If the app has slept, Community Cloud renders a wake button
              # (title is a bare "Streamlit"). It is drawn client-side a moment
              # after load, so we must wait for it, not check once. A plain load
              # does NOT wake the app — the button must be clicked, otherwise the
              # ping reports a false success over the sleeper page. If the button
              # never appears the app was already awake.
              try:
                  page.get_by_role("button", name="get this app back up").click(timeout=20000)
              except PWTimeout:
                  pass

              # Poll (up to ~180s) for the real app to finish booting. Waking a
              # slept app is not instant.
              title = ""
              for _ in range(36):
                  title = page.title()
                  if EXPECTED_TITLE in title:
                      break
                  page.wait_for_timeout(5000)

              print(f"loaded: {title}")
              if EXPECTED_TITLE not in title:
                  # Diagnostics to pin down the sleeper UI if the wake path missed.
                  print("buttons:", page.get_by_role("button").all_inner_texts())
                  print("body:", page.inner_text("body")[:500])
              browser.close()
              # Fail loudly if the real app never came up, instead of a false green.
              if EXPECTED_TITLE not in title:
                  raise SystemExit(f"app did not load — title was {title!r}")
          EOF
