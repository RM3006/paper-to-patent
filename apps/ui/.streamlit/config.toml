# Force the editorial light theme regardless of the viewer's OS dark-mode setting.
# Without this, Streamlit follows the browser/OS preference: a dark header bar,
# white sidebar-nav text, and white body text that vanishes on the white cards.
[theme]
base = "light"
primaryColor = "#111111"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor = "#111111"
font = "sans serif"

[client]
# Hide the developer toolbar (hamburger / "Deploy"), matching the human-protein-atlas app.
toolbarMode = "minimal"
# Suppress the auto-generated pages/ sidebar nav at the config level, before the frontend
# ever renders it -- render.py's CSS hid it after the fact, which let it flash visibly on
# load and on page navigation. This app's only navigation is the tab strip in render_nav().
showSidebarNavigation = false
